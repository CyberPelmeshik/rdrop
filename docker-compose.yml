services:
  backend:
    build: ./backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3000"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
